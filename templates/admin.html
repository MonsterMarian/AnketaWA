<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Anketa</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <main>
        <section class="container" id="login-form" aria-labelledby="login-heading">
            <h1 id="login-heading">Admin Přihlášení</h1>
            <div class="options-list">
                <input type="password" id="admin-token" placeholder="Vložte tajný token" class="option-label"
                    style="width: 100%; margin-bottom: 20px;" aria-label="Tajný token">
            </div>
            <button id="login-btn">Vstoupit</button>
        </section>

        <section class="container" id="stats-panel" style="display: none;" aria-labelledby="dashboard-heading">
            <h1 id="dashboard-heading">Admin Dashboard</h1>

            <div class="bug-report"
                style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;">
                <div>
                    <p style="color: var(--text-muted)">Celkem kliknutí</p>
                    <h2 id="total-clicks">0</h2>
                </div>
                <div>
                    <p style="color: var(--text-muted)">Unikátní IP</p>
                    <h2 id="unique-ips">0</h2>
                </div>
                <div style="grid-column: span 2;">
                    <p style="color: var(--text-muted)">Poslední hlas</p>
                    <h2 id="last-vote-time" style="font-size: 1.2rem;">-</h2>
                </div>
            </div>

            <div id="admin-results-container" class="results-section" aria-live="polite">
                <!-- Stats will be injected here -->
            </div>

            <button class="secondary" id="reset-btn"
                style="color: #ef4444; border-color: rgba(239, 68, 68, 0.2); margin-top: 30px; margin-right: 10px;">Resetovat
                hlasy</button>
            <button class="secondary" id="logout-btn" style="margin-top: 30px;">Odhlásit se</button>
        </section>
    </main>

    <script>
        const tokenInput = document.getElementById('admin-token');
        const loginBtn = document.getElementById('login-btn');
        const loginForm = document.getElementById('login-form');
        const statsPanel = document.getElementById('stats-panel');
        const logoutBtn = document.getElementById('logout-btn');
        const resetBtn = document.getElementById('reset-btn');

        const loadStats = async () => {
            const token = localStorage.getItem('adminToken');
            if (!token) return;

            try {
                const res = await fetch('/api/admin/stats', {
                    headers: { 'Authorization': token }
                });
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('total-clicks').textContent = data.meta.total_clicks;
                    document.getElementById('unique-ips').textContent = data.unique_ips;
                    document.getElementById('last-vote-time').textContent = data.meta.last_vote;

                    loginForm.style.display = 'none';
                    statsPanel.style.display = 'block';
                } else {
                    localStorage.removeItem('adminToken');
                    location.reload();
                }
            } catch (err) {
                console.error(err);
            }
        };

        loginBtn.addEventListener('click', () => {
            localStorage.setItem('adminToken', tokenInput.value.trim());
            loadStats();
        });

        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('adminToken');
            location.reload();
        });

        resetBtn.addEventListener('click', async () => {
            if (!confirm('Opravdu chcete nenávratně smazat všechny hlasy?')) return;
            const token = localStorage.getItem('adminToken');
            if (!token) return;

            try {
                const res = await fetch('/api/reset', {
                    method: 'POST',
                    headers: { 'Authorization': token }
                });

                if (res.ok) {
                    alert('Všechny hlasy byly úspěšně vynulovány.');
                    loadStats(); // Reload stats after reset
                } else {
                    alert('Bohužel se nepodařilo resetovat hlasy. Nesprávný token?');
                }
            } catch (err) {
                alert('Chyba při komunikaci se serverem.');
            }
        });

        if (localStorage.getItem('adminToken')) loadStats();
    </script>
</body>

</html>
